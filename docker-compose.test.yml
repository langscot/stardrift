version: '3.9'

services:
  bot-test:
    image: ghcr.io/langscot/stardrift:latest
    container_name: stardrift-bot-test
    restart: unless-stopped
    env_file:
      - .env.test
    environment:
      DATABASE_URL: postgresql://stellar:stellar_password@stardrift-postgres:5432/stardrift_test
      REDIS_URL: redis://stardrift-redis:6379/1
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    networks:
      - stardrift-network

networks:
  stardrift-network:
    external: true
    name: stardrift-network
