version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stardrift-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stellar
      POSTGRES_PASSWORD: stellar_password
      POSTGRES_DB: stardrift_live
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: stardrift-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  default:
    name: stardrift-network

volumes:
  postgres_data:
  redis_data:
