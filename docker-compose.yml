name: stardrift-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: stardrift-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: stellar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stellar_password}
      POSTGRES_DB: stardrift
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stellar"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: stardrift-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_dev_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
  redis_dev_data:
